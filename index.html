<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação Forms - Executar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-executar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-executar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-executar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-limpar {
            background: #f0f0f0;
            color: #333;
        }

        .btn-limpar:hover {
            background: #e0e0e0;
        }

        /* Resultado */
        .resultado {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .resultado.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-sucesso {
            background: #d4edda;
            color: #155724;
        }

        .status-erro {
            background: #f8d7da;
            color: #721c24;
        }

        .status-executando {
            background: #d1ecf1;
            color: #0c5460;
        }

        .resumo {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .resumo-item:last-child {
            border-bottom: none;
        }

        .resumo-label {
            color: #666;
            font-size: 14px;
        }

        .resumo-valor {
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        .percentual {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
        }

        .rotas-lista {
            margin-top: 20px;
        }

        .rota-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .rota-sucesso {
            background: #d4edda;
            color: #155724;
        }

        .rota-falha {
            background: #f8d7da;
            color: #721c24;
        }

        .rota-nome {
            flex: 1;
        }

        .rota-status {
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.1);
            font-size: 11px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mensagem-erro {
            padding: 15px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
        }

        .info-config {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        .info-config strong {
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .rota-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .rota-status {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Automação Forms</h1>
            <p class="subtitle">Execute seus formulários do celular</p>
        </header>

        <div class="info-config">
            <strong>⚙️ Configuração</strong>
            <div>Coloque aqui o IP/domínio da sua VPS:
                <div id="vpsConfig" style="margin-top: 8px; padding: 8px; background: white; border-radius: 3px; font-family: monospace; font-size: 12px;">
                    Clique aqui para configurar
                </div>
            </div>
        </div>

        <div>
            <div class="form-group">
                <label for="urlFormulario">URL do Formulário Google</label>
                <input 
                    type="url" 
                    id="urlFormulario" 
                    placeholder="Cole aqui: https://forms.gle/... ou https://docs.google.com/forms/..."
                    required
                >
            </div>

            <div class="button-group">
                <button class="btn-executar" id="btnExecutar">
                    Executar Automação
                </button>
                <button class="btn-limpar" id="btnLimpar">
                    Limpar
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processando... Este processo pode levar alguns minutos.</p>
            </div>

            <div class="resultado" id="resultado">
                <div id="statusBadge" class="status-badge"></div>

                <div class="resumo" id="resumo"></div>

                <div class="rotas-lista" id="rotasLista"></div>

                <div class="mensagem-erro" id="mensagemErro" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        
        const configKey = 'automacao_forms_vps_url';
        const defaultVpsUrl = 'http://159.203.134.102:5000';  // Seu IP VPS
        
        let vpsUrl = localStorage.getItem(configKey) || defaultVpsUrl;
        
        // Mostrar e permitir editar VPS URL
        const vpsConfigElement = document.getElementById('vpsConfig');
        vpsConfigElement.addEventListener('click', () => {
            const novaUrl = prompt('Digite o endereço da sua VPS (ex: http://seu-ip:5000 ou http://seu-dominio.com:5000):', vpsUrl);
            if (novaUrl && novaUrl.trim()) {
                vpsUrl = novaUrl.trim();
                localStorage.setItem(configKey, vpsUrl);
                atualizarConfigDisplay();
            }
        });
        
        function atualizarConfigDisplay() {
            vpsConfigElement.textContent = vpsUrl || defaultVpsUrl;
        }
        
        atualizarConfigDisplay();

        // ==================== ELEMENTOS DOM ====================
        
        const inputUrl = document.getElementById('urlFormulario');
        const btnExecutar = document.getElementById('btnExecutar');
        const btnLimpar = document.getElementById('btnLimpar');
        const loading = document.getElementById('loading');
        const resultado = document.getElementById('resultado');
        const statusBadge = document.getElementById('statusBadge');
        const resumoDiv = document.getElementById('resumo');
        const rotasListaDiv = document.getElementById('rotasLista');
        const mensagemErroDiv = document.getElementById('mensagemErro');

        // ==================== EVENT LISTENERS ====================
        
        btnExecutar.addEventListener('click', executarAutomacao);
        btnLimpar.addEventListener('click', limpar);
        
        inputUrl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                executarAutomacao();
            }
        });

        // ==================== FUNÇÕES ====================
        
        async function executarAutomacao() {
            const url = inputUrl.value.trim();
            
            if (!url) {
                mostrarErro('Digite a URL do formulário');
                return;
            }
            
            // Mostrar loading
            btnExecutar.disabled = true;
            loading.classList.add('show');
            resultado.classList.remove('show');
            mensagemErroDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${vpsUrl}/executar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const dados = await response.json();
                
                if (response.ok) {
                    mostrarResultado(dados);
                } else {
                    mostrarErro(dados.mensagem || 'Erro ao executar automação');
                }
            } catch (erro) {
                mostrarErro(`Erro de conexão: ${erro.message}. Verifique o endereço da VPS.`);
            } finally {
                loading.classList.remove('show');
                btnExecutar.disabled = false;
            }
        }
        
        function mostrarResultado(dados) {
            const resumo = dados.resumo;
            
            // Status badge
            statusBadge.textContent = '✅ Sucesso';
            statusBadge.className = 'status-badge status-sucesso';
            
            // Resumo
            resumoDiv.innerHTML = `
                <div class="resumo-item">
                    <span class="resumo-label">Total de Rotas</span>
                    <span class="resumo-valor">${resumo.total_rotas}</span>
                </div>
                <div class="resumo-item">
                    <span class="resumo-label">✅ Enviadas com Sucesso</span>
                    <span class="resumo-valor" style="color: #28a745;">${resumo.sucesso}</span>
                </div>
                <div class="resumo-item">
                    <span class="resumo-label">❌ Falhas</span>
                    <span class="resumo-valor" style="color: #dc3545;">${resumo.falha}</span>
                </div>
                <div class="resumo-item">
                    <span class="resumo-label">Taxa de Sucesso</span>
                    <span class="percentual">${resumo.percentual_sucesso}%</span>
                </div>
            `;
            
            // Rotas
            if (dados.rotas && dados.rotas.length > 0) {
                let rotasHtml = '<h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">Detalhes das Rotas:</h3>';
                dados.rotas.forEach((rota, idx) => {
                    const classeStatus = rota.status === 'sucesso' ? 'rota-sucesso' : 'rota-falha';
                    const icone = rota.status === 'sucesso' ? '✅' : '❌';
                    
                    rotasHtml += `
                        <div class="rota-item ${classeStatus}">
                            <span class="rota-nome">${idx + 1}. ${rota.rota}</span>
                            <span class="rota-status">${icone} ${rota.status === 'sucesso' ? 'OK' : 'FALHA'}</span>
                        </div>
                    `;
                });
                rotasListaDiv.innerHTML = rotasHtml;
            }
            
            resultado.classList.add('show');
        }
        
        function mostrarErro(mensagem) {
            statusBadge.textContent = '❌ Erro';
            statusBadge.className = 'status-badge status-erro';
            
            mensagemErroDiv.textContent = mensagem;
            mensagemErroDiv.style.display = 'block';
            
            resumoDiv.innerHTML = '';
            rotasListaDiv.innerHTML = '';
            
            resultado.classList.add('show');
        }
        
        function limpar() {
            inputUrl.value = '';
            resultado.classList.remove('show');
            loading.classList.remove('show');
            mensagemErroDiv.style.display = 'none';
            btnExecutar.disabled = false;
            inputUrl.focus();
        }
        
        // Focus no input ao carregar
        inputUrl.focus();
    </script>
</body>
</html>
